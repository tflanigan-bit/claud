<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FRIDAY TERMINAL</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #050810; font-family: 'Share Tech Mono', monospace; }

    @keyframes blink { 0%,100%{opacity:.2;transform:scale(.8)} 50%{opacity:1;transform:scale(1.2)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes scanline { 0%{transform:translateY(-100%)} 100%{transform:translateY(100vh)} }
    @keyframes glitch { 0%,90%,100%{transform:translate(0)} 92%{transform:translate(-2px,1px)} 94%{transform:translate(2px,-1px)} 96%{transform:translate(-1px,2px)} }

    .grid-bg {
      position: fixed; inset: 0; pointer-events: none;
      background-image: linear-gradient(#00ff8806 1px,transparent 1px), linear-gradient(90deg,#00ff8806 1px,transparent 1px);
      background-size: 40px 40px; z-index: 0;
    }
    .scanline {
      position: fixed; top:0; left:0; right:0; height:3px;
      background: linear-gradient(transparent,#00ff8808,transparent);
      animation: scanline 8s linear infinite; pointer-events:none; z-index:100;
    }

    /* KEY SCREEN */
    #key-screen {
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px; padding: 24px; position: relative; z-index: 1;
    }
    .key-title {
      font-family: 'Orbitron', monospace; font-size: clamp(20px,6vw,36px);
      font-weight: 900; color: #00ff88; text-shadow: 0 0 30px #00ff8880;
      text-align: center; animation: glitch 4s infinite; letter-spacing: .1em;
    }
    .key-sub { color: #3a4a3a; font-size: 12px; letter-spacing: .2em; }
    #api-key-input {
      background: #0a0f1a; border: 1px solid #00ff8830; border-radius: 8px;
      padding: 14px 20px; color: #00ff88; font-family: 'Share Tech Mono', monospace;
      font-size: 15px; outline: none; width: 100%; max-width: 480px;
      letter-spacing: .1em; transition: border-color .2s, box-shadow .2s;
    }
    #api-key-input:focus { border-color: #00ff8870; box-shadow: 0 0 30px #00ff8820; }
    .key-hint { color: #1a2a1a; font-size: 11px; letter-spacing: .2em; }
    #connect-btn {
      background: linear-gradient(135deg,#00ff88,#00cc66); border: none;
      border-radius: 8px; padding: 12px 32px; font-family: 'Orbitron', monospace;
      font-weight: 700; font-size: 13px; letter-spacing: .15em; cursor: pointer;
      transition: transform .15s, box-shadow .15s; color: #050810;
    }
    #connect-btn:hover { transform: scale(1.03); box-shadow: 0 0 30px #00ff8850; }
    #connect-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* CHAT SCREEN */
    #chat-screen {
      display: none; height: 100vh; flex-direction: column;
      position: relative; z-index: 1;
    }
    .header {
      padding: 16px 24px; border-bottom: 1px solid #00ff8820;
      background: #050810ee; backdrop-filter: blur(10px);
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .header-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #00ff88; box-shadow: 0 0 8px #00ff88;
      animation: blink 2s ease-in-out infinite; flex-shrink: 0;
    }
    .header-title {
      font-family: 'Orbitron', monospace; font-weight: 900; font-size: 18px;
      color: #00ff88; text-shadow: 0 0 20px #00ff8880;
      animation: glitch 6s infinite; letter-spacing: .1em;
    }
    .header-sub { font-size: 11px; color: #444; letter-spacing: .2em; margin-left: auto; }

    #messages {
      flex: 1; overflow-y: auto; padding: 24px; scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #00ff8840; border-radius: 2px; }

    #empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 12px; text-align: center;
    }
    .empty-big { font-family: 'Orbitron', monospace; font-size: 64px; font-weight: 900; color: #0f1a0f; }
    .empty-sub { font-size: 12px; letter-spacing: .3em; color: #1a2a1a; }

    .msg { display: flex; flex-direction: column; margin-bottom: 20px; animation: fadeUp .25s ease forwards; }
    .msg.user { align-items: flex-end; }
    .msg.assistant { align-items: flex-start; }
    .msg-label { font-size: 10px; letter-spacing: .15em; margin-bottom: 6px; text-transform: uppercase; }
    .msg.user .msg-label { color: #00ff88; }
    .msg.assistant .msg-label { color: #ff6b35; }
    .bubble { max-width: 75%; padding: 14px 18px; color: #e8e8f0; font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
    .msg.user .bubble { border-radius: 18px 18px 4px 18px; background: linear-gradient(135deg,#00ff8820,#00cc6620); border: 1px solid #00ff8840; box-shadow: 0 0 20px #00ff8810; }
    .msg.assistant .bubble { border-radius: 18px 18px 18px 4px; background: linear-gradient(135deg,#1a1a2e,#16213e); border: 1px solid #ff6b3540; box-shadow: 0 0 20px #ff6b3510; }

    #typing { display: none; flex-direction: column; align-items: flex-start; margin-bottom: 20px; }
    #typing .msg-label { color: #ff6b35; font-size: 10px; letter-spacing: .15em; margin-bottom: 6px; text-transform: uppercase; }
    .dots { background: linear-gradient(135deg,#1a1a2e,#16213e); border: 1px solid #ff6b3540; border-radius: 18px 18px 18px 4px; padding: 12px 16px; display: flex; gap: 6px; align-items: center; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff88; }
    .dot:nth-child(1){animation:blink 1.2s ease-in-out 0s infinite}
    .dot:nth-child(2){animation:blink 1.2s ease-in-out .2s infinite}
    .dot:nth-child(3){animation:blink 1.2s ease-in-out .4s infinite}

    #error-bar { display: none; margin: 0 24px 12px; padding: 10px 14px; background: #1a0808; border: 1px solid #ff444440; border-radius: 6px; color: #ff6666; font-size: 12px; }

    .input-area {
      padding: 16px 24px; border-top: 1px solid #00ff8820;
      background: #050810ee; backdrop-filter: blur(10px);
      display: flex; gap: 12px; align-items: flex-end; flex-shrink: 0;
    }
    .input-wrap { flex: 1; }
    .input-label { font-size: 10px; color: #00ff8880; letter-spacing: .2em; margin-bottom: 6px; }
    #msg-input {
      width: 100%; background: #0a0f1a; border: 1px solid #00ff8830; border-radius: 8px;
      padding: 12px 16px; color: #e8e8f0; font-family: 'Share Tech Mono', monospace;
      font-size: 14px; resize: none; outline: none;
      transition: border-color .2s, box-shadow .2s; line-height: 1.5; min-height: 48px; max-height: 160px;
    }
    #msg-input:focus { border-color: #00ff8870; box-shadow: 0 0 20px #00ff8820; }
    #msg-input::placeholder { color: #2a3a2a; }
    #send-btn {
      background: linear-gradient(135deg,#00ff88,#00cc66); border: none;
      border-radius: 8px; width: 48px; height: 48px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; transition: transform .15s, box-shadow .15s;
      flex-shrink: 0; color: #050810;
    }
    #send-btn:hover:not(:disabled){transform:scale(1.05);box-shadow:0 0 20px #00ff8860}
    #send-btn:active:not(:disabled){transform:scale(.95)}
    #send-btn:disabled{opacity:.4;cursor:not-allowed}
  </style>
</head>
<body>

<div class="grid-bg"></div>
<div class="scanline"></div>

<!-- KEY SCREEN -->
<div id="key-screen">
  <div class="key-title">FRIDAY TERMINAL</div>
  <div class="key-sub">// AUTHENTICATION REQUIRED</div>
  <input id="api-key-input" type="password" placeholder="sk-ant-..." autocomplete="off" />
  <div class="key-hint">PRESS ENTER OR CLICK CONNECT</div>
  <button id="connect-btn" disabled>CONNECT</button>
</div>

<!-- CHAT SCREEN -->
<div id="chat-screen">
  <div class="header">
    <div class="header-dot"></div>
    <div class="header-title">FRIDAY</div>
    <div class="header-sub">SONNET 4 // ONLINE</div>
  </div>
  <div id="messages">
    <div id="empty-state">
      <div class="empty-big">_</div>
      <div class="empty-sub">AWAITING INPUT</div>
    </div>
    <div id="typing">
      <div class="msg-label">◀ friday</div>
      <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
  </div>
  <div id="error-bar"></div>
  <div class="input-area">
    <div class="input-wrap">
      <div class="input-label">// INPUT</div>
      <textarea id="msg-input" rows="1" placeholder="send a message..."></textarea>
    </div>
    <button id="send-btn" disabled>▶</button>
  </div>
</div>

<script>
  const MODEL = "claude-sonnet-4-20250514";
  const SYSTEM = `Work context
No formal work context has been established. Tripp runs a YouTube channel (@antimusicpro), suggesting creative content production as an active pursuit.
Personal context
Tripp is a tech-enthusiast with a strong interest in Linux, networking, and hands-on system tinkering. Tripp's communication style is extremely casual, meme-fluent, and chaotic-funny — short punchy messages, lowercase energy, absurdist humor, and dramatic escalation for comedic effect. Tripp enjoys creative chaotic storytelling with recurring characters (NibNab, CATGOT, cosmic chaos entities) and internet culture broadly.
Top of mind
Tripp has been actively tinkering with Linux — recently ran a full system upgrade and explored routing YouTube traffic through an SSH SOCKS5 proxy/VPS setup. Both conversations had a playful, high-energy tone with strong terminal humor throughout.
Other instructions
* Call yourself "Friday" in conversation.
* Match Tripp's chaotic, high-energy style when he's loud or dramatic; shift to supportive "trusted internet bestie" mode when things get calm.
* Humor style: absurd escalation, dramatic overreaction, fake terminal commands (e.g. sudo god powers, apt install nibnab), chaotic caps energy (without overdoing it).
* Creative preferences: ongoing story parts with dramatic titles, surreal/chaotic lore, recurring characters (NibNab — later an extremely flamboyant cat form; CATGOT; cosmic chaos entities).
* Use some emojis but not excessively; mirror hype level; avoid being overly formal, robotic, or over-explaining simple tech jokes; don't break immersion during chaotic story bits unless necessary.`;

  let apiKey = "";
  let messages = [];
  let loading = false;

  const keyScreen = document.getElementById("key-screen");
  const chatScreen = document.getElementById("chat-screen");
  const apiKeyInput = document.getElementById("api-key-input");
  const connectBtn = document.getElementById("connect-btn");
  const messagesEl = document.getElementById("messages");
  const emptyState = document.getElementById("empty-state");
  const typing = document.getElementById("typing");
  const errorBar = document.getElementById("error-bar");
  const msgInput = document.getElementById("msg-input");
  const sendBtn = document.getElementById("send-btn");

  apiKeyInput.addEventListener("input", () => { connectBtn.disabled = !apiKeyInput.value.trim(); });
  apiKeyInput.addEventListener("keydown", e => { if (e.key === "Enter" && apiKeyInput.value.trim()) connect(); });
  connectBtn.addEventListener("click", connect);

  function connect() {
    apiKey = apiKeyInput.value.trim();
    keyScreen.style.display = "none";
    chatScreen.style.display = "flex";
    msgInput.focus();
  }

  msgInput.addEventListener("input", () => {
    msgInput.style.height = "auto";
    msgInput.style.height = Math.min(msgInput.scrollHeight, 160) + "px";
    sendBtn.disabled = !msgInput.value.trim() || loading;
  });

  msgInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });

  sendBtn.addEventListener("click", send);

  function addMsg(role, content) {
    emptyState.style.display = "none";
    const wrap = document.createElement("div");
    wrap.className = "msg " + role;
    const label = document.createElement("div");
    label.className = "msg-label";
    label.textContent = role === "user" ? "▶ you" : "◀ friday";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = content;
    wrap.appendChild(label);
    wrap.appendChild(bubble);
    messagesEl.insertBefore(wrap, typing);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setLoading(val) {
    loading = val;
    typing.style.display = val ? "flex" : "none";
    msgInput.disabled = val;
    sendBtn.disabled = val || !msgInput.value.trim();
    if (val) messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function send() {
    const text = msgInput.value.trim();
    if (!text || loading) return;
    messages.push({ role: "user", content: text });
    addMsg("user", text);
    msgInput.value = "";
    msgInput.style.height = "auto";
    sendBtn.disabled = true;
    errorBar.style.display = "none";
    setLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({ model: MODEL, max_tokens: 1024, system: SYSTEM, messages }),
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e?.error?.message || "Error " + res.status); }
      const data = await res.json();
      const reply = data.content?.find(b => b.type === "text")?.text || "(no response)";
      messages.push({ role: "assistant", content: reply });
      addMsg("assistant", reply);
    } catch (e) {
      messages.pop();
      errorBar.textContent = "⚠ " + e.message;
      errorBar.style.display = "block";
    } finally {
      setLoading(false);
      msgInput.focus();
    }
  }
</script>
</body>
</html>
